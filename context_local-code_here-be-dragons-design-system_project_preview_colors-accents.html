<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Tiamat Condensed SC";
    src: local("Tiamat Condensed SC"),
         url("../fonts/TiamatCondensedSC-Regular.woff2") format("woff2"),
         url("../fonts/TiamatCondensedSC-Regular.woff") format("woff");
    font-weight: 700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5ecd7; padding: 20px; font-family: "JetBrains Mono", monospace; }
  .label { font-family: "Tiamat Condensed SC","Cinzel",serif; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #7a5a22; margin-bottom: 12px; }
  .groups { display: flex; flex-direction: column; gap: 14px; }
  .group-label { font-family: "Tiamat Condensed SC","Cinzel",serif; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #a88d5a; margin-bottom: 6px; }
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .swatch-color {
    height: 52px; border: 1px solid rgba(26,20,16,0.2);
    position: relative; overflow: hidden;
  }
  .swatch-name { font-family: "Tiamat Condensed SC","Cinzel",serif; font-size: 11px; color: #3d2817; margin-top: 4px; }
  .swatch-hex { font-size: 10px; color: #6b4f35; }
  .wide { grid-template-columns: repeat(2, 1fr); }
</style>
</head>
<body>
  <div class="label">Accent Palette · Use Sparingly</div>
  <div class="groups">
    <div>
      <div class="group-label">Gold — Treasure</div>
      <div class="swatches">
        <div><div class="swatch-color" style="background:#b8893b;"></div><div class="swatch-name">Gold</div><div class="swatch-hex">#b8893b</div></div>
        <div><div class="swatch-color" style="background:#d4a548;"></div><div class="swatch-name">Gold Bright</div><div class="swatch-hex">#d4a548</div></div>
        <div><div class="swatch-color" style="background:#7a5a22;"></div><div class="swatch-name">Gold Deep</div><div class="swatch-hex">#7a5a22</div></div>
      </div>
    </div>
    <div>
      <div class="group-label">Blood — Dragon's Fire</div>
      <div class="swatches wide">
        <div><div class="swatch-color" style="background:#7a1212;"></div><div class="swatch-name">Blood</div><div class="swatch-hex">#7a1212</div></div>
        <div><div class="swatch-color" style="background:#4a0808;"></div><div class="swatch-name">Blood Deep</div><div class="swatch-hex">#4a0808</div></div>
      </div>
    </div>
    <div>
      <div class="group-label">Magic — Arcane &amp; Divine</div>
      <div class="swatches wide">
        <div><div class="swatch-color" style="background:#2d5a3d;"></div><div class="swatch-name">Emerald</div><div class="swatch-hex">#2d5a3d</div></div>
        <div><div class="swatch-color" style="background:#1e3a5f;"></div><div class="swatch-name">Sapphire</div><div class="swatch-hex">#1e3a5f</div></div>
      </div>
    </div>
    <div>
      <div class="group-label">Shadow — The Void</div>
      <div class="swatches" style="grid-template-columns:1fr 2fr;">
        <div><div class="swatch-color" style="background:#2a1f17;"></div><div class="swatch-name">Shadow</div><div class="swatch-hex">#2a1f17</div></div>
      </div>
    </div>
  </div>
</body>
</html>
