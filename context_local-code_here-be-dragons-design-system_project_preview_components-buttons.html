<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Tiamat Condensed SC";
    src: local("Tiamat Condensed SC"),
         url("../fonts/TiamatCondensedSC-Regular.woff2") format("woff2"),
         url("../fonts/TiamatCondensedSC-Regular.woff") format("woff");
    font-weight: 700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5ecd7; padding: 20px 24px; }
  .eyebrow { font-family: "Tiamat Condensed SC","Cinzel",serif; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #7a5a22; margin-bottom: 16px; display: block; }
  .group { margin-bottom: 18px; }
  .group-label { font-family: "Tiamat Condensed SC","Cinzel",serif; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #a88d5a; margin-bottom: 8px; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px;
    font-family: "Tiamat Condensed SC","Cinzel",serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; border-radius: 1px; text-decoration: none;
    border: 1.5px solid #1a1410;
    background: #ead9b3; color: #1a1410;
    box-shadow: 3px 3px 0 #1a1410;
    transition: background 0.15s ease;
  }
  .btn:hover  { background: #d4bc88; }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #1a1410; }

  .btn--primary {
    background: #7a1212; color: #f5ecd7;
    border-color: #4a0808;
    box-shadow: 3px 3px 0 #4a0808;
  }
  .btn--primary:hover  { background: #4a0808; }
  .btn--primary:active { box-shadow: 1px 1px 0 #4a0808; }

  .btn--gold {
    background: #b8893b; color: #1a1410;
    border-color: #7a5a22;
    box-shadow: 3px 3px 0 #7a5a22;
  }
  .btn--gold:hover  { background: #d4a548; }
  .btn--gold:active { box-shadow: 1px 1px 0 #7a5a22; }

  .btn--sm { padding: 6px 14px; font-size: 10px; }
  .btn--lg { padding: 14px 28px; font-size: 14px; }

  .state-label { font-family: "JetBrains Mono",monospace; font-size: 9px; color: #6b4f35; text-align: center; margin-top: 4px; }
  .state-col { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  hr { border: none; border-top: 1px dashed #d4bc88; margin: 12px 0; }
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <span class="eyebrow">Buttons · Three Variants</span>

  <div class="group">
    <div class="group-label">Neutral · Explore</div>
    <div class="btn-row">
      <div class="state-col"><button class="btn">Explore</button><div class="state-label">default</div></div>
      <div class="state-col"><button class="btn" style="background:#d4bc88;">Explore</button><div class="state-label">:hover</div></div>
      <div class="state-col"><button class="btn" style="transform:translate(2px,2px);box-shadow:1px 1px 0 #1a1410;">Explore</button><div class="state-label">:active</div></div>
      <div class="state-col"><button class="btn btn--sm">Small</button><div class="state-label">--sm</div></div>
      <div class="state-col"><button class="btn btn--lg">Large</button><div class="state-label">--lg</div></div>
    </div>
  </div>

  <hr>

  <div class="group">
    <div class="group-label">Primary · Cast Spell · Dragon's Fire</div>
    <div class="btn-row">
      <div class="state-col"><button class="btn btn--primary">Cast Spell</button><div class="state-label">default</div></div>
      <div class="state-col"><button class="btn btn--primary" style="background:#4a0808;">Cast Spell</button><div class="state-label">:hover</div></div>
      <div class="state-col"><button class="btn btn--primary" style="transform:translate(2px,2px);box-shadow:1px 1px 0 #4a0808;">Cast Spell</button><div class="state-label">:active</div></div>
      <div class="state-col"><button class="btn btn--primary btn--sm">Attack</button><div class="state-label">--sm</div></div>
    </div>
  </div>

  <hr>

  <div class="group" style="margin-bottom:0;">
    <div class="group-label">Gold · Acquire · Reward</div>
    <div class="btn-row">
      <div class="state-col"><button class="btn btn--gold">Acquire Item</button><div class="state-label">default</div></div>
      <div class="state-col"><button class="btn btn--gold" style="background:#d4a548;">Acquire Item</button><div class="state-label">:hover</div></div>
      <div class="state-col"><button class="btn btn--gold" style="transform:translate(2px,2px);box-shadow:1px 1px 0 #7a5a22;">Acquire Item</button><div class="state-label">:active</div></div>
      <div class="state-col"><button class="btn btn--gold btn--sm">Loot</button><div class="state-label">--sm</div></div>
    </div>
  </div>
</body>
</html>
