<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Here Be Dragons — File Upload</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--parchment-100);
      color: var(--ink-brown);
      font-family: var(--font-body);
      font-size: var(--text-body);
      line-height: var(--lh-body);
      padding: 3rem 2rem;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 { font-family: var(--font-display); font-size: var(--text-h1); color: var(--ink-black); letter-spacing: var(--ls-display); line-height: var(--lh-display); margin-bottom: 0.5rem; }
    .subtitle { font-family: var(--font-flavor); font-style: italic; color: var(--ink-faded); margin-bottom: 3rem; border-bottom: 2px double var(--gold-deep); padding-bottom: 1.5rem; }
    .section-heading { font-family: var(--font-display); font-size: var(--text-h2); color: var(--ink-black); letter-spacing: var(--ls-display); margin-bottom: 1.5rem; margin-top: 3rem; }
    .spec-block { background: var(--parchment-200); border: 1px solid var(--ink-faded); padding: 0.875rem 1.25rem; margin-top: 0.75rem; max-width: 620px; }
    .spec-label { font-family: var(--font-mono); font-size: 0.6875rem; color: var(--ink-faded); letter-spacing: 0.12em; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
    .spec-value { font-family: var(--font-mono); font-size: 0.8125rem; color: var(--ink-black); line-height: 1.65; }
    .gap { margin-bottom: 2rem; }
    .demo-area { padding: 1.5rem 2rem; border: 1px dashed var(--ink-faded); background: var(--parchment-100); min-height: 3.5rem; }
    .demo-area--card { background: linear-gradient(135deg, var(--parchment-100), var(--parchment-200)); border: 2px solid var(--ink-brown); box-shadow: var(--shadow-card); padding: 1.5rem 2rem; }
    .demo-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .demo-cols { grid-template-columns: 1fr; } }
    .demo-col-label { font-family: var(--font-display); font-size: 0.6875rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 0.75rem; display: block; }
    .live-output { font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faded); margin-top: 0.75rem; min-height: 1.2em; }
    .live-output strong { color: var(--gold-deep); font-weight: 400; }
    footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px dashed var(--ink-faded); font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faded); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>

  <h1>File Upload</h1>
  <p class="subtitle">A parchment-themed drag-and-drop file zone. Drop a scroll or click to consult the archives — with size validation, multi-file support, and full keyboard accessibility.</p>

  <!-- Demo mount points -->
  <div id="demo-1"></div>
  <div id="demo-2"></div>
  <div id="demo-3"></div>
  <div id="demo-4"></div>
  <div id="demo-5"></div>
  <div id="demo-6"></div>

  <script type="text/babel" src="../ui_kits/app/components/FileUpload.jsx"></script>

  <script type="text/babel">
    const { FileUpload } = window;

    // ── 1. Default single file, no accept filter ──────────────────────────────
    const Demo1 = () => {
      const [files, setFiles] = React.useState([]);
      return (
        <React.Fragment>
          <h2 className="section-heading">1. Default — single file, no filter</h2>
          <div className="demo-area gap" style={{ maxWidth: '500px' }}>
            <FileUpload
              onChange={setFiles}
            />
            <p className="live-output">
              {files.length > 0
                ? <React.Fragment>
                    <strong>{files.length}</strong> {files.length === 1 ? 'scroll' : 'scrolls'} selected
                  </React.Fragment>
                : 'No scroll selected yet…'}
            </p>
          </div>
          <div className="spec-block">
            <span className="spec-label">Usage</span>
            <span className="spec-value">{'<FileUpload onChange={files => console.log(files)} />'}</span>
          </div>
        </React.Fragment>
      );
    };

    // ── 2. Multiple files, maxSizeMB=2 ────────────────────────────────────────
    const Demo2 = () => {
      const [files, setFiles] = React.useState([]);
      return (
        <React.Fragment>
          <h2 className="section-heading">2. Multiple files — max 2 MB each</h2>
          <div className="demo-area gap" style={{ maxWidth: '500px' }}>
            <FileUpload
              multiple
              maxSizeMB={2}
              placeholder="Drop your tomes here"
              onChange={setFiles}
            />
            <p className="live-output">
              {files.length > 0
                ? <React.Fragment>
                    <strong>{files.length}</strong> {files.length === 1 ? 'tome' : 'tomes'} inscribed
                  </React.Fragment>
                : 'Drop multiple files — each must be under 2 MB…'}
            </p>
          </div>
          <div className="spec-block">
            <span className="spec-label">Usage</span>
            <span className="spec-value">{'<FileUpload multiple maxSizeMB={2} placeholder="Drop your tomes here" />'}</span>
          </div>
        </React.Fragment>
      );
    };

    // ── 3. Image files only ───────────────────────────────────────────────────
    const Demo3 = () => {
      const [files, setFiles] = React.useState([]);
      return (
        <React.Fragment>
          <h2 className="section-heading">3. Image files only — accept="image/*"</h2>
          <div className="demo-area gap" style={{ maxWidth: '500px' }}>
            <FileUpload
              accept="image/*"
              placeholder="Drop your portrait here"
              onChange={setFiles}
            />
            <p className="live-output">
              {files.length > 0
                ? <React.Fragment>
                    Portrait inscribed: <strong>{files[0].name}</strong>
                  </React.Fragment>
                : 'Images only — the accept hint appears inside the zone…'}
            </p>
          </div>
          <div className="spec-block">
            <span className="spec-label">Usage</span>
            <span className="spec-value">{'<FileUpload accept="image/*" placeholder="Drop your portrait here" />'}</span>
          </div>
        </React.Fragment>
      );
    };

    // ── 4. Disabled state ─────────────────────────────────────────────────────
    const Demo4 = () => (
      <React.Fragment>
        <h2 className="section-heading">4. Disabled state</h2>
        <div className="demo-area gap" style={{ maxWidth: '500px' }}>
          <FileUpload
            disabled
            placeholder="The vault is sealed"
          />
        </div>
        <div className="spec-block">
          <span className="spec-label">Usage</span>
          <span className="spec-value">{'<FileUpload disabled placeholder="The vault is sealed" />'}</span>
        </div>
      </React.Fragment>
    );

    // ── 5. With label + hint text ─────────────────────────────────────────────
    const Demo5 = () => {
      const [files, setFiles] = React.useState([]);
      return (
        <React.Fragment>
          <h2 className="section-heading">5. With label and hint text</h2>
          <div className="demo-area gap" style={{ maxWidth: '500px' }}>
            <FileUpload
              label="Attach Spell Components"
              hint="Only parchment scrolls in .pdf or .doc format may pass through the wards of this sanctum."
              accept=".pdf,.doc,.docx"
              multiple
              maxSizeMB={5}
              onChange={setFiles}
            />
          </div>
          <div className="spec-block">
            <span className="spec-label">Usage</span>
            <span className="spec-value">{'<FileUpload label="Attach Spell Components" hint="…" accept=".pdf,.doc,.docx" multiple maxSizeMB={5} />'}</span>
          </div>
        </React.Fragment>
      );
    };

    // ── 6. On card surface ────────────────────────────────────────────────────
    const Demo6 = () => {
      const [files, setFiles] = React.useState([]);
      return (
        <React.Fragment>
          <h2 className="section-heading">6. On card surface</h2>
          <div className="demo-area--card gap" style={{ maxWidth: '520px' }}>
            <p style={{
              fontFamily: 'var(--font-display)',
              fontSize: '1.125rem',
              color: 'var(--ink-black)',
              letterSpacing: 'var(--ls-display)',
              marginBottom: '1.25rem',
            }}>Inscribe a Relic</p>
            <FileUpload
              label="Relic Documentation"
              hint="A wise archivist keeps records of every artefact that crosses the threshold."
              accept="image/*,.pdf"
              multiple
              maxSizeMB={10}
              onChange={setFiles}
            />
          </div>
        </React.Fragment>
      );
    };

    // ── Mount all demos ───────────────────────────────────────────────────────
    const root1 = ReactDOM.createRoot(document.getElementById('demo-1'));
    const root2 = ReactDOM.createRoot(document.getElementById('demo-2'));
    const root3 = ReactDOM.createRoot(document.getElementById('demo-3'));
    const root4 = ReactDOM.createRoot(document.getElementById('demo-4'));
    const root5 = ReactDOM.createRoot(document.getElementById('demo-5'));
    const root6 = ReactDOM.createRoot(document.getElementById('demo-6'));

    root1.render(<Demo1 />);
    root2.render(<Demo2 />);
    root3.render(<Demo3 />);
    root4.render(<Demo4 />);
    root5.render(<Demo5 />);
    root6.render(<Demo6 />);
  </script>

  <footer>
    Here Be Dragons Design System — File Upload component preview
  </footer>
</body>
</html>
