<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Tiamat Condensed SC";
    src: local("Tiamat Condensed SC"),
         url("../fonts/TiamatCondensedSC-Regular.woff2") format("woff2"),
         url("../fonts/TiamatCondensedSC-Regular.woff") format("woff");
    font-weight: 700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5ecd7; padding: 20px 24px; }
  .eyebrow {
    font-family: "Tiamat Condensed SC","Cinzel",serif;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: #7a5a22; margin-bottom: 18px; display: block;
  }
  .dice-row { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .die-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  /* Coloured tile behind each die icon */
  .die-icon {
    position: relative;
    cursor: pointer;
    isolation: isolate;
    transition: transform 0.35s cubic-bezier(0.4,1.4,0.5,1),
                filter 0.2s ease;
  }
  .die-icon:hover {
    transform: rotate(20deg) scale(1.1);
    filter: drop-shadow(2px 4px 8px rgba(26,20,16,0.45));
  }
  /* Screen blend: black pixels in SVG show parent bg colour; white pixels stay white */
  .die-icon img {
    display: block;
    mix-blend-mode: screen;
  }

  .die-label {
    font-family: "Tiamat Condensed SC","Cinzel",serif;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #7a5a22;
  }
  .die-desc {
    font-family: "JetBrains Mono","Courier New",monospace;
    font-size: 9px; color: #6b4f35; text-align: center;
  }
</style>
</head>
<body>
  <span class="eyebrow">Dice Icons · Hover for Spring Animation</span>
  <div class="dice-row">

    <!-- d4 — Sapphire (Divine) -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#1e3a5f; width:84px; height:84px;">
        <img src="../assets/dice-d4.svg" width="84" height="84" alt="d4">
      </div>
      <div class="die-label">d4</div>
      <div class="die-desc">Sapphire · Divine</div>
    </div>

    <!-- d6 — Emerald (Arcane) -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#2d5a3d; width:84px; height:84px;">
        <img src="../assets/dice-d6.svg" width="84" height="84" alt="d6">
      </div>
      <div class="die-label">d6</div>
      <div class="die-desc">Emerald · Arcane</div>
    </div>

    <!-- d8 — Shadow (Void) -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#2a1f17; width:84px; height:84px;">
        <img src="../assets/dice-d8.svg" width="84" height="84" alt="d8">
      </div>
      <div class="die-label">d8</div>
      <div class="die-desc">Shadow · Rogue</div>
    </div>

    <!-- d10 — Gold (Treasure) -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#7a5a22; width:84px; height:84px;">
        <img src="../assets/dice-d10.svg" width="84" height="84" alt="d10">
      </div>
      <div class="die-label">d10</div>
      <div class="die-desc">Gold · Treasure</div>
    </div>

    <!-- d12 — Blood Deep -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#4a0808; width:84px; height:84px;">
        <img src="../assets/dice-d12.svg" width="84" height="84" alt="d12">
      </div>
      <div class="die-label">d12</div>
      <div class="die-desc">Blood Deep · Barbarian</div>
    </div>

    <!-- d20 — Blood (Initiative) -->
    <div class="die-wrap">
      <div class="die-icon" style="background:#7a1212; width:84px; height:84px;">
        <img src="../assets/dice-d20.svg" width="84" height="84" alt="d20">
      </div>
      <div class="die-label">d20</div>
      <div class="die-desc">Blood · Initiative</div>
    </div>

  </div>
</body>
</html>
